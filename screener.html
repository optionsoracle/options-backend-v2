<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CC Screener">
<title>Covered Call Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #22222e;
    --accent: #7c6af7;
    --green: #22d98a;
    --yellow: #f5c842;
    --red: #f25f5c;
    --text: #e2e2ee;
    --dim: #6b6b80;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(34,217,138,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-family: var(--mono);
    font-size: 1.2rem;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .header-left p {
    font-size: 0.78rem;
    color: var(--dim);
    margin-top: 3px;
  }

  .live-status {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px 5px 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .status-dot.connecting { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.live { background: var(--green); animation: pulse 2s infinite; box-shadow: 0 0 8px rgba(34,217,138,0.5); }
  .status-dot.offline { background: var(--red); }

  .status-text {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .status-text.live { color: var(--green); }
  .status-text.offline { color: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Criteria panel */
  .criteria {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }

  .criteria-grid.three {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .strategy-toggle {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 2px;
  }
  .strategy-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 7px 8px;
    border-radius: 5px;
    cursor: pointer;
    -webkit-appearance: none;
    transition: all 0.15s;
    text-align: center;
  }
  .strategy-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.1);
  }

  .exp-mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 2px;
  }
  .exp-mode-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    -webkit-appearance: none;
    transition: all 0.15s;
  }
  .exp-mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.1);
  }
  select#expRange {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    -webkit-appearance: none;
    color-scheme: dark;
  }
  select#expRange:focus { border-color: var(--accent); }

  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  input[type="date"],
  input[type="number"],
  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    color-scheme: dark;
    -webkit-appearance: none;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,106,247,0.15); }

  .ticker-input-wrap {
    position: relative;
  }

  .ticker-checkboxes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 2px;
  }

  .ticker-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 68px;
    text-align: center;
    user-select: none;
  }

  .ticker-chip input[type="checkbox"] {
    display: none;
  }

  .ticker-chip span {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--dim);
    transition: color 0.15s;
  }

  .ticker-chip small {
    font-family: var(--sans);
    font-size: 0.6rem;
    color: var(--dim);
    opacity: 0.6;
    transition: color 0.15s;
  }

  .ticker-chip:has(input:checked) {
    background: rgba(124,106,247,0.1);
    border-color: var(--accent);
  }

  .ticker-chip:has(input:checked) span {
    color: var(--accent);
  }

  .ticker-chip:has(input:checked) small {
    color: var(--accent);
    opacity: 0.7;
  }

  .ticker-chip:active {
    transform: scale(0.96);
  }

  .ticker-hint {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--dim);
    margin-top: 5px;
  }

  .rank-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: 4px;
    padding: 3px 7px;
    flex-shrink: 0;
  }

  .ticker-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .iv-badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .iv-badge.normal   { color: var(--green); border-color: rgba(34,217,138,0.3); background: rgba(34,217,138,0.08); }
  .iv-badge.elevated { color: var(--yellow); border-color: rgba(245,200,66,0.3); background: rgba(245,200,66,0.08); }
  .iv-badge.high     { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .iv-badge.extreme  { color: var(--red); border-color: rgba(242,95,92,0.3); background: rgba(242,95,92,0.08); }

  /* ITM badge */
  .itm-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(242,95,92,0.15);
    color: var(--red);
    border: 1px solid rgba(242,95,92,0.35);
  }

  /* Distance tag */
  .dist-tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .dist-tag.otm { color: #6ee7b7; border: 1px solid rgba(110,231,183,0.25); background: rgba(110,231,183,0.07); }
  .dist-tag.itm { color: var(--red); border: 1px solid rgba(242,95,92,0.25); background: rgba(242,95,92,0.07); }

  /* Premium row */
  .premium-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .premium-label { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .premium-val { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--text); }

  /* Prob of profit row */
  .prob-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .prob-label { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .prob-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 600; color: #a78bfa; }

  .return-actual { font-size: 0.65rem; color: var(--dim); font-weight: 400; letter-spacing: 0; text-transform: none; }
  .dte-warn { color: #f59e0b; font-size: 0.7rem; font-weight: 600; }

  .net-proceeds-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .net-proceeds-val {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    color: #4ade80;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .fetch-timestamp {
    display: block;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: #a0a0b8;
    text-align: center;
    margin: -4px 0 16px;
    letter-spacing: 0.03em;
  }
  .net-gain { font-size: 0.8rem; color: #4ade80; font-weight: 700; }

  /* Cost basis */
  .cost-basis-row {
    padding: 10px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(99,102,241,0.04);
  }
  .cost-basis-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 6px;
  }
  .cost-basis-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 130px;
  }
  .cost-basis-dollar {
    font-family: var(--mono);
    font-size: 0.9rem;
    color: var(--dim);
  }
  .cost-basis-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 5px 8px;
    width: 110px;
    outline: none;
  }
  .cost-basis-input:focus { border-color: #6366f1; }
  .cost-basis-result { margin-top: 8px; }
  .cb-results-wrap { display: flex; flex-direction: column; gap: 4px; }
  .cb-strike-result {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text);
  }
  .cb-warning {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: #fbbf24;
    margin-bottom: 6px;
  }
  .cb-profitable-msg {
    display: block;
    font-family: var(--mono);
    font-size: 0.78rem;
    margin: 6px 0 4px;
  }
  .toggle-unprofitable-btn {
    margin-top: 7px;
    background: transparent;
    border: 1px solid #fbbf24;
    color: #fbbf24;
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    display: inline-block;
    -webkit-appearance: none;
  }
  .toggle-unprofitable-btn:active { opacity: 0.7; }
  .suggestion-header {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: #4ade80;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 18px 0;
  }

  /* ITM filter button */
  .itm-filter-btn {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .itm-filter-btn:hover { border-color: var(--red); color: var(--red); }
  .itm-filter-btn.active { background: rgba(242,95,92,0.12); border-color: rgba(242,95,92,0.4); color: var(--red); }

  /* Net proceeds row for ITM strikes */
  .net-proceeds-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .net-proceeds { color: var(--red) !important; font-weight: 600; }
  .net-vs-price { font-size: 0.7rem; color: var(--dim); font-weight: 400; }

  /* Strike card top row */
  .strike-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .strike-tags { display: flex; gap: 5px; align-items: center; }

  /* 52-week range bar */
  .range-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }
  .range-label { font-family: var(--mono); font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .range-val { font-family: var(--mono); font-size: 0.65rem; color: var(--dim); white-space: nowrap; }
  .range-track {
    position: relative;
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    min-width: 80px;
  }
  .range-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 2px;
  }
  .range-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #8b5cf6;
  }

  .earnings-tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--dim);
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .earnings-tag-warn {
    color: var(--red) !important;
    border-color: rgba(242,95,92,0.3) !important;
    background: rgba(242,95,92,0.08) !important;
  }

  .earnings-warning-banner {
    margin: 0 18px 14px;
    padding: 10px 14px;
    background: rgba(242,95,92,0.08);
    border: 1px solid rgba(242,95,92,0.25);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .screen-btn-wrap {
    position: sticky;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 0 36px;
    background: linear-gradient(to bottom, transparent, var(--bg) 35%);
    margin: 16px -20px -20px;
    padding-left: 20px;
    padding-right: 20px;
    z-index: 10;
  }

  .screen-btn {
    width: 100%;
    padding: 24px;
    background: linear-gradient(135deg, #7c6af7 0%, #5b4de0 50%, #8b5cf6 100%);
    border: none;
    border-radius: 16px;
    color: white;
    font-family: var(--mono);
    font-size: 1.05rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08) inset,
      0 8px 40px rgba(124,106,247,0.55),
      0 2px 8px rgba(0,0,0,0.5);
  }

  .screen-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 55%);
    pointer-events: none;
  }

  .screen-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .screen-btn:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1) inset,
      0 16px 48px rgba(124,106,247,0.65),
      0 4px 16px rgba(0,0,0,0.5);
  }

  .screen-btn:active {
    transform: translateY(1px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06) inset,
      0 4px 20px rgba(124,106,247,0.4);
  }

  .screen-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .screen-btn .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .screen-btn.loading .spinner { display: inline-block; }

  /* Results */
  .results-header {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .results-count {
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 10px;
  }

  .ticker-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .ticker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }

  .ticker-symbol {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 500;
  }

  .ticker-name {
    font-size: 0.78rem;
    color: var(--dim);
    margin-left: 8px;
  }

  .ticker-price {
    font-family: var(--mono);
    font-size: 0.9rem;
    color: var(--text);
  }

  .ticker-exp {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
  }

  .ticker-error {
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--red);
  }

  /* Strike cards */
  .strikes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }

  .strike-card {
    padding: 16px 18px;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .strike-card:last-child { border-right: none; }

  .strike-card.best {
    background: rgba(124,106,247,0.04);
  }

  .best-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--accent);
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.3);
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .strike-price-row {
    margin-bottom: 10px;
  }
  .strike-price {
    font-family: var(--mono);
    font-size: 1.3rem;
    color: var(--text);
  }
  .strike-exp-tag {
    font-family: var(--mono);
    font-size: 1.3rem;
    color: var(--text);
  }

  .return-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .return-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .return-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .return-val {
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--green);
    font-weight: 500;
  }

  .return-val.called { color: var(--yellow); }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .detail-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .detail-val {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text);
  }
  .detail-val.itm-net { color: var(--red); }

  .no-results {
    text-align: center;
    padding: 48px 20px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--dim);
  }

  .no-results span {
    display: block;
    font-size: 2rem;
    margin-bottom: 12px;
  }

  .error-banner {
    background: rgba(242,95,92,0.08);
    border: 1px solid rgba(242,95,92,0.2);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--red);
    margin-bottom: 16px;
  }

  @media (max-width: 600px) {
    .criteria-grid { grid-template-columns: 1fr; }
    .criteria-grid.three { grid-template-columns: 1fr 1fr; }
    .strikes-grid { grid-template-columns: 1fr; }
    .strike-card { border-right: none; border-bottom: 1px solid var(--border); }
    .strike-card:last-child { border-bottom: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1 id="app-title">Covered Call Screener</h1>
      <p>Top 3 strikes per ticker · ranked by annualized return</p>
    </div>
    <div class="live-status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Connecting...</span>
    </div>
  </header>

  <!-- Criteria -->
  <div class="criteria">
    <div class="criteria-grid">
      <div class="field">
        <label>Expiration</label>
        <div class="exp-mode-toggle">
          <button class="exp-mode-btn active" id="modeSpecific" onclick="setExpMode('specific')">Specific Date</button>
          <button class="exp-mode-btn" id="modeRange" onclick="setExpMode('range')">Date Range</button>
        </div>
        <input type="date" id="expDate" style="margin-top:8px;" />
        <select id="expRange" style="display:none;margin-top:8px;">
          <option value="7">Next 7 days</option>
          <option value="14">Next 14 days</option>
          <option value="30" selected>Next 30 days</option>
          <option value="60">Next 60 days</option>
          <option value="90">Next 90 days</option>
        </select>
      </div>
      <div class="field">
        <label>Min Annualized Return (%)</label>
        <input type="number" id="minAnn" value="15" min="0" step="1" />
      </div>
    </div>
    <div class="criteria-grid" style="margin-bottom:16px;">
      <div class="field">
        <label id="minCalledLabel">Min If-Called-Away Return (%)</label>
        <input type="number" id="minCalled" value="50" min="0" step="1" />
      </div>
      <div class="field">
        <label>Strategy</label>
        <div class="strategy-toggle">
          <button class="strategy-btn active" id="btnCC" onclick="setStrategy('cc')">Covered Call</button>
          <button class="strategy-btn" id="btnCSP" onclick="setStrategy('csp')">Cash Secured Put</button>
        </div>
      </div>
    </div>
    <div class="field" style="margin-bottom:16px;">
      <label>Watchlist</label>
      <div class="ticker-checkboxes" id="ticker-checkboxes">
        <label class="ticker-chip"><input type="checkbox" value="NVDA" /><span>NVDA</span><small>NVIDIA</small></label>
        <label class="ticker-chip"><input type="checkbox" value="META" /><span>META</span><small>Meta</small></label>
        <label class="ticker-chip"><input type="checkbox" value="MSFT" /><span>MSFT</span><small>Microsoft</small></label>
        <label class="ticker-chip"><input type="checkbox" value="AAPL" /><span>AAPL</span><small>Apple</small></label>
        <label class="ticker-chip"><input type="checkbox" value="GOOGL" /><span>GOOGL</span><small>Google A</small></label>
        <label class="ticker-chip"><input type="checkbox" value="PLTR" /><span>PLTR</span><small>Palantir</small></label>
        <label class="ticker-chip"><input type="checkbox" value="ORCL" /><span>ORCL</span><small>Oracle</small></label>
      </div>
    </div>
    <div class="field" style="margin-bottom:16px;">
      <label>Additional Tickers (optional — comma separated)</label>
      <input type="text" id="tickers" placeholder="e.g. TSLA, AMD" />
      <div class="ticker-hint">Add any tickers here on top of your watchlist selections above</div>
    </div>
    <div class="screen-btn-wrap">
      <button class="screen-btn" id="screenBtn" onclick="runScreen()">
        <span class="spinner"></span>
        Run Screen
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-area"></div>

</div>

<script>
  const API = 'https://options-backend-v2-r27b.onrender.com';

  // Set default expiration to next Friday
  function setDefaultDate() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    while (d.getDay() !== 5) d.setDate(d.getDate() + 1);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('expDate').value = `${yyyy}-${mm}-${dd}`;
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('expDate').min = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,'0')}-${String(tomorrow.getDate()).padStart(2,'0')}`;
  }

  let expMode = 'specific';
  let strategy = 'cc';

  function setStrategy(s) {
    strategy = s;
    document.getElementById('btnCC').classList.toggle('active', s === 'cc');
    document.getElementById('btnCSP').classList.toggle('active', s === 'csp');
    document.getElementById('app-title').textContent = s === 'cc' ? 'Covered Call Screener' : 'Cash Secured Put Screener';
    const minCalledRow = document.getElementById('minCalled').closest('.field');
    const minCalledLabel = document.getElementById('minCalledLabel');
    if (s === 'csp') {
      minCalledRow.style.opacity = '0.4';
      minCalledRow.style.pointerEvents = 'none';
      minCalledLabel.textContent = 'Min If-Called-Away Return (N/A for CSP)';
    } else {
      minCalledRow.style.opacity = '';
      minCalledRow.style.pointerEvents = '';
      minCalledLabel.textContent = 'Min If-Called-Away Return (%)';
    }
  }

  function setExpMode(mode) {
    expMode = mode;
    document.getElementById('modeSpecific').classList.toggle('active', mode === 'specific');
    document.getElementById('modeRange').classList.toggle('active', mode === 'range');
    document.getElementById('expDate').style.display = mode === 'specific' ? '' : 'none';
    document.getElementById('expRange').style.display = mode === 'range' ? '' : 'none';
  }

  function getExpDate() {
    if (expMode === 'specific') {
      return document.getElementById('expDate').value;
    } else {
      const days = parseInt(document.getElementById('expRange').value);
      const d = new Date();
      d.setDate(d.getDate() + days);
      // Find the nearest Friday on or before that date
      while (d.getDay() !== 5) d.setDate(d.getDate() - 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
  }

  function getExpRange() {
    if (expMode !== 'range') return null;
    const days = parseInt(document.getElementById('expRange').value);
    const from = new Date();
    from.setDate(from.getDate() + 7); // at least 7 days out
    const to = new Date();
    to.setDate(to.getDate() + days);
    const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return { from: fmt(from), to: fmt(to) };
  }

  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = 'status-dot ' + state;
    txt.className = 'status-text ' + state;
    txt.textContent = text;
  }

  async function initServer() {
    setStatus('connecting', 'Connecting...');
    try {
      const res = await fetch(`${API}/health`, { signal: AbortSignal.timeout(35000) });
      if (res.ok) {
        setStatus('live', 'Live');
      } else {
        setStatus('offline', 'Offline');
      }
    } catch {
      setStatus('offline', 'Offline');
    }
  }

  async function runScreen() {
    const expDate = getExpDate();
    const minAnn = parseFloat(document.getElementById('minAnn').value) || 0;
    const minCalled = parseFloat(document.getElementById('minCalled').value) || 0;
    if (!expDate) {
      showError('Please select an expiration date.');
      return;
    }

    // Collect checked watchlist tickers
    const checked = [...document.querySelectorAll('.ticker-chip input:checked')].map(el => el.value);

    // Collect any extras from text input
    const extrasRaw = document.getElementById('tickers').value;
    const extras = extrasRaw ? extrasRaw.split(',').map(t => t.trim().toUpperCase()).filter(Boolean) : [];

    // Combine, deduplicate
    const tickers = [...new Set([...checked, ...extras])];

    if (tickers.length === 0) {
      showError('Please select at least one ticker from your watchlist or enter one in the additional field.');
      return;
    }

    const btn = document.getElementById('screenBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.querySelector('.spinner').style.display = 'inline-block';

    document.getElementById('results-area').innerHTML = '';
    setStatus('connecting', 'Scanning...');

    const expRange = getExpRange();
    const body = {
      tickers,
      min_ann_return: minAnn,
      min_called_return: minCalled,
      strategy: strategy
    };
    if (expRange) {
      body.exp_date_from = expRange.from;
      body.exp_date_to = expRange.to;
    } else {
      body.expiration = expDate;
    }

    try {
      const res = await fetch(`${API}/screen`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(60000)
      });

      if (!res.ok) throw new Error('Server error');
      const data = await res.json();

      if (data.error) {
        showError(data.error);
        return;
      }

      setStatus('live', 'Live');
      const fetchedAt = new Date();
      renderResults(data.results, minAnn, minCalled, fetchedAt);

    } catch (err) {
      showError('Could not reach server. Make sure Render is running and try again.');
      setStatus('offline', 'Offline');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  let hideITM = false;
  let lastResults = null;
  let lastMinAnn = 0;
  let lastMinCalled = 0;
  let lastFetchedAt = null;

  function toggleITM() {
    hideITM = !hideITM;
    const btn = document.getElementById('itmFilterBtn');
    if (hideITM) {
      btn.classList.add('active');
      btn.textContent = 'Hiding ITM';
    } else {
      btn.classList.remove('active');
      btn.textContent = 'Hide ITM';
    }
    if (lastResults) renderResults(lastResults, lastMinAnn, lastMinCalled, lastFetchedAt);
  }

  function renderResults(results, minAnn, minCalled, fetchedAt) {
    lastResults = results;
    lastMinAnn = minAnn;
    lastMinCalled = minCalled;
    lastFetchedAt = fetchedAt;
    const area = document.getElementById('results-area');

    const timeStr = fetchedAt ? fetchedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
    const timestampHtml = timeStr ? `<span class="fetch-timestamp">⏱ Screener was run at ${timeStr} · option prices may be delayed up to 20 min · <strong style="text-decoration:underline;">verify all details before trading</strong></span>` : '';

    // Apply ITM filter to strikes if enabled
    const filtered = results.map(r => {
      if (!r.strikes) return r;
      // Store full unsliced list for cost basis suggestions
      fullStrikeStore[r.ticker] = hideITM ? r.strikes.filter(s => !s.in_the_money) : r.strikes;
      const strikes = fullStrikeStore[r.ticker].slice(0, 3);
      return { ...r, strikes };
    });

    const withResults = filtered.filter(r => r.strikes && r.strikes.length > 0);
    const withErrors = filtered.filter(r => r.error && !r.strikes);
    const withNoMatch = filtered.filter(r => r.strikes && r.strikes.length === 0);

    // Sort matched tickers by their best strike's annualized return, descending
    withResults.sort((a, b) => b.strikes[0].ann_return - a.strikes[0].ann_return);

    const itmBtn = `<button id="itmFilterBtn" class="itm-filter-btn${hideITM ? ' active' : ''}" onclick="toggleITM()">${hideITM ? 'Hiding ITM' : 'Hide ITM'}</button>`;

    let html = `<div class="results-header">
      Results
      <span class="results-count">${withResults.length} of ${results.length} tickers matched</span>
      ${itmBtn}
    </div>
    ${timestampHtml}`;

    if (withResults.length === 0) {
      html += `<div class="no-results">
        <span>🔍</span>
        No tickers matched your criteria.<br>Try lowering the minimum return thresholds or choosing a different expiration date.
      </div>`;
      area.innerHTML = html;
      return;
    }

    // Render matched tickers ranked by return
    withResults.forEach((r, idx) => {
      html += renderTickerBlock(r, idx + 1);
    });

    // Then show tickers with no matching strikes
    if (withNoMatch.length > 0) {
      html += `<div class="results-header" style="margin-top:20px;">No Strikes Met Criteria</div>`;
      for (const r of withNoMatch) {
        html += `<div class="ticker-block">
          <div class="ticker-header">
            <div><span class="ticker-symbol">${r.ticker}</span><span class="ticker-name">${r.name || ''}</span></div>
            <span class="ticker-price">$${r.price}</span>
          </div>
          <div class="ticker-error">No strikes found with ≥${minAnn}% annualized${r.strategy !== 'csp' ? ' / ≥' + minCalled + '% if-called-away' : ''} for ${r.expiration}</div>
        </div>`;
      }
    }

    // Errors last
    if (withErrors.length > 0) {
      html += `<div class="results-header" style="margin-top:20px;">Errors</div>`;
      for (const r of withErrors) {
        html += `<div class="ticker-block">
          <div class="ticker-header"><span class="ticker-symbol">${r.ticker}</span></div>
          <div class="ticker-error">✗ ${r.error}</div>
        </div>`;
      }
    }

    area.innerHTML = html;

    // Re-trigger any stored cost basis values after re-render
    // Small delay ensures DOM cards are fully painted before we filter them
    setTimeout(() => {
      for (const ticker in costBasisStore) {
        if (costBasisStore[ticker] && strikeDataStore[ticker]) {
          const input = document.getElementById('cb-' + ticker);
          if (input) {
            const dte = parseInt(input.dataset.dte);
            updateCostBasis(ticker, costBasisStore[ticker], strikeDataStore[ticker], dte);
          }
        } else {
          const suggSection = document.getElementById('sugg-' + ticker);
          if (suggSection) suggSection.style.display = 'none';
        }
      }
    }, 50);
  }

  function renderTickerBlock(r, rank) {
    // Store strike data for cost basis calculations
    strikeDataStore[r.ticker] = r.strikes;
    const rankHtml = rank ? `<span class="rank-badge">#${rank}</span>` : '';

    // IV badge
    let ivBadge = '';
    if (r.iv_rank_label) {
      const cls = r.iv_rank_label.toLowerCase();
      ivBadge = `<span class="iv-badge ${cls}">IV ${r.iv_rank_label}${r.iv_rank_pct ? ' ' + r.iv_rank_pct + '%' : ''}</span>`;
    }

    // Earnings tags
    const lastEarningsTag = r.last_earnings_date
      ? `<span class="earnings-tag">Last Earnings ${r.last_earnings_date}</span>`
      : `<span class="earnings-tag">Last Earnings Unknown</span>`;
    let nextEarningsTag = '';
    if (r.earnings_date) {
      const tagClass = r.earnings_warning ? 'earnings-tag earnings-tag-warn' : 'earnings-tag';
      nextEarningsTag = `<span class="${tagClass}">Next Earnings ${r.earnings_date}</span>`;
    } else {
      nextEarningsTag = `<span class="earnings-tag">Next Earnings Unknown</span>`;
    }

    // Earnings warning banner
    const earningsBanner = r.earnings_warning
      ? `<div class="earnings-warning-banner">Earnings on ${r.earnings_date} fall before expiration — premiums are elevated but the trade carries event risk</div>`
      : '';

    // 52-week range bar
    let rangeBar = '';
    if (r.week_52_high && r.week_52_low && r.price) {
      const pct = Math.max(0, Math.min(100, (r.price - r.week_52_low) / (r.week_52_high - r.week_52_low) * 100));
      rangeBar = `
        <div class="range-bar-wrap">
          <span class="range-label">52W</span>
          <span class="range-val">$${r.week_52_low.toFixed(0)}</span>
          <div class="range-track">
            <div class="range-fill" style="width:${pct.toFixed(1)}%"></div>
            <div class="range-dot" style="left:${pct.toFixed(1)}%"></div>
          </div>
          <span class="range-val">$${r.week_52_high.toFixed(0)}</span>
        </div>`;
    }

    const currentPrice = r.price;

    function fmtExp(dateStr) {
      if (!dateStr) return '';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]);
    }

    function renderStrikeCard(s, i, isSuggestion) {
      const isCsp = r.strategy === 'csp';
      const bestBadge = (!isSuggestion && i === 0) ? '<span class="best-badge">Best</span>' : '';
      const expLabel = expMode === 'range' ? ` <span class="strike-exp-tag"> – ${fmtExp(r.expiration)}</span>` : '';
      const probHtml = s.prob_profit != null
        ? `<div class="prob-row"><span class="prob-label">Prob. Profit</span><span class="prob-val">${s.prob_profit.toFixed(0)}%</span></div>`
        : '';

      if (isCsp) {
        // CSP: strikes are at/below current price. OTM = below price (good), ITM = above price (put already in the money)
        const itmBadge = s.in_the_money ? '<span class="itm-badge">ITM</span>' : '';
        // distance_pct is (strike - price)/price, so negative means below price = OTM for a put
        const absDist = Math.abs(s.distance_pct);
        const distLabel = s.in_the_money
          ? `<span class="dist-tag itm">${s.distance_pct.toFixed(1)}% ITM</span>`
          : `<span class="dist-tag otm">${absDist.toFixed(1)}% OTM</span>`;

        // Discount to market: how far below current price the breakeven is
        const discountColor = s.discount_pct >= 3 ? 'var(--green)' : s.discount_pct >= 1 ? 'var(--yellow)' : 'var(--dim)';

        return `
        <div class="strike-card ${!isSuggestion && i === 0 ? 'best' : ''}" data-breakeven="${s.breakeven}">
          <div class="strike-card-top">
            ${bestBadge}
            ${itmBadge}
            <div class="strike-price-row">
              <div class="strike-price">$${s.strike.toFixed(2)}${expLabel}</div>
            </div>
            <div class="strike-tags">${distLabel}</div>
          </div>
          <div class="return-row">
            <div class="return-item">
              <span class="return-label">Ann. Return</span>
              <span class="return-val">${s.ann_return.toFixed(1)}%</span>
            </div>
            <div class="return-item">
              <span class="return-label">Trade Return</span>
              <span class="return-val called">${s.trade_return.toFixed(2)}%</span>
            </div>
          </div>
          <div class="premium-row">
            <span class="premium-label">Premium (Bid)</span>
            <span class="premium-val">$${s.premium.toFixed(2)}</span>
          </div>
          <div class="net-proceeds-row">
            <span class="detail-label">If Assigned — Effective Buy Price</span>
            <span class="net-proceeds-val" style="color:${discountColor};">
              $${s.breakeven.toFixed(2)}/sh
              <span class="net-vs-price">${s.discount_dollar >= 0 ? '−' : '+'}$${Math.abs(s.discount_dollar).toFixed(2)} vs market (${s.discount_pct >= 0 ? '−' : '+'}${Math.abs(s.discount_pct).toFixed(1)}%)</span>
            </span>
          </div>
          ${probHtml}
          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-label">Capital Required</span>
              <span class="detail-val">$${s.capital.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">IV</span>
              <span class="detail-val">${s.iv ? s.iv + '%' : '—'}</span>
            </div>
          </div>
        </div>`;

      } else {
        // CC
        const itmBadge = s.in_the_money ? '<span class="itm-badge">ITM</span>' : '';
        const distLabel = s.distance_pct >= 0
          ? `<span class="dist-tag otm">+${s.distance_pct.toFixed(1)}% OTM</span>`
          : `<span class="dist-tag itm">${s.distance_pct.toFixed(1)}% ITM</span>`;
        return `
        <div class="strike-card ${!isSuggestion && i === 0 ? 'best' : ''}">
          <div class="strike-card-top">
            ${bestBadge}
            ${itmBadge}
            <div class="strike-price-row">
              <div class="strike-price">$${s.strike.toFixed(2)}${expLabel}</div>
            </div>
            <div class="strike-tags">${distLabel}</div>
          </div>
          <div class="return-row">
            <div class="return-item">
              <span class="return-label">Ann. Return <span class="return-actual">(${s.trade_return.toFixed(2)}% actual)</span></span>
              <span class="return-val">${s.ann_return.toFixed(1)}%</span>
            </div>
            <div class="return-item">
              <span class="return-label">If Called Away <span class="return-actual">(${s.called_trade_return.toFixed(2)}% actual)</span></span>
              <span class="return-val called">${s.called_ann_return.toFixed(1)}%</span>
            </div>
          </div>
          <div class="premium-row">
            <span class="premium-label">Premium (Bid)</span>
            <span class="premium-val">$${s.premium.toFixed(2)}</span>
          </div>
          ${s.in_the_money ? `
          <div class="net-proceeds-row">
            <span class="detail-label">Net if Called Away</span>
            <span class="net-proceeds-val">
              $${(s.strike + s.premium).toFixed(2)}/sh
              <span class="net-vs-price">vs $${currentPrice.toFixed(2)} current</span>
              <span class="net-gain">+$${((s.strike + s.premium) - currentPrice).toFixed(2)}/sh</span>
            </span>
          </div>` : ''}
          ${probHtml}
          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-label">Break-Even</span>
              <span class="detail-val">$${s.breakeven.toFixed(2)}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Trade Return</span>
              <span class="detail-val">+${s.trade_return.toFixed(2)}%</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Volume</span>
              <span class="detail-val">${s.volume.toLocaleString()}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Open Int.</span>
              <span class="detail-val">${s.open_interest.toLocaleString()}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">IV</span>
              <span class="detail-val">${s.iv ? s.iv + '%' : '—'}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Capital</span>
              <span class="detail-val">$${s.capital.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
            </div>
          </div>
        </div>`;
      }
    }

    const strikesHtml = r.strikes.map((s, i) => renderStrikeCard(s, i, false)).join('');

    // For CSP: pre-render ALL strikes so updateCostBasis can swap cards without re-rendering
    if (r.strategy === 'csp') {
      const fullList = fullStrikeStore[r.ticker] || [];
      renderedCardStore[r.ticker] = fullList.map((s, i) => ({ strike: s.strike, breakeven: s.breakeven, html: renderStrikeCard(s, i, false) }));
    }

    // Pre-render suggestion cards (hidden until cost basis triggers them)
    const fullList = fullStrikeStore[r.ticker] || [];
    const displayedSet = new Set(r.strikes.map(s => s.strike));
    const suggestionCards = fullList
      .filter(s => !displayedSet.has(s.strike))
      .slice(0, 3)
      .map((s, i) => renderStrikeCard(s, i, true))
      .join('');

    return `<div class="ticker-block" data-ticker="${r.ticker}" data-strategy="${r.strategy || 'cc'}">
      <div class="ticker-header">
        <div style="display:flex;align-items:center;gap:10px;">
          ${rankHtml}
          <div>
            <div><span class="ticker-symbol">${r.ticker}</span><span class="ticker-name">${r.name || ''}</span></div>
            <div class="ticker-meta-row">${ivBadge}${lastEarningsTag}${nextEarningsTag}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="display:flex;gap:16px;align-items:center;justify-content:flex-end;">
            <span class="ticker-price">$${r.price.toFixed(2)}</span>
            <span class="ticker-exp">${expMode === 'range' ? 'Best across range' : 'Exp ' + r.expiration} · ${r.dte}d${r.dte <= 7 ? ' <span class="dte-warn">! Short expiry</span>' : ''}</span>
          </div>
          ${rangeBar}
        </div>
      </div>
      <div class="cost-basis-row">
        <label class="cost-basis-label" for="cb-${r.ticker}">${r.strategy === 'csp' ? 'My Target Buy Price (if assigned)' : 'My Cost Basis'}</label>
        <div class="cost-basis-input-wrap">
          <span class="cost-basis-dollar">$</span>
          <input class="cost-basis-input" id="cb-${r.ticker}" type="number" min="0" step="0.01"
            placeholder="0.00"
            value="${costBasisStore[r.ticker] || ''}"
            data-ticker="${r.ticker}"
            data-dte="${r.dte}"
          />
        </div>
        <div class="cost-basis-result" id="cbr-${r.ticker}"></div>
      </div>
      ${earningsBanner}
      <div class="strikes-grid">${strikesHtml}</div>
      <div class="suggestion-section" id="sugg-${r.ticker}" style="display:none;">
        <div class="suggestion-header">💡 ${r.strategy === 'csp' ? 'Below your target price' : 'Profitable at your cost basis'}</div>
        <div class="strikes-grid">${suggestionCards}</div>
      </div>
    </div>`;
  }

  function toggleUnprofitable(ticker) {
    const btn = document.getElementById('toggleUnprof-' + ticker);
    const msg = document.getElementById('profMsg-' + ticker);
    const warnText = document.getElementById('warnText-' + ticker);
    const strikesGrid = document.querySelector(`[data-ticker="${ticker}"] .strikes-grid`);
    const linesDiv = document.getElementById('cblines-' + ticker);
    const cbResult = document.getElementById('cbr-' + ticker);
    if (!strikesGrid || !btn) return;
    const hidden = strikesGrid.style.display === 'none';
    strikesGrid.style.display = hidden ? '' : 'none';
    btn.textContent = hidden ? 'Hide unprofitable strikes' : 'Show unprofitable strikes';
    if (msg) msg.style.display = hidden ? 'none' : 'inline';
    if (warnText) warnText.style.display = hidden ? '' : 'none';
    // Swap the summary lines
    if (linesDiv && cbResult) {
      if (!hidden) {
        // hiding unprofitable — show suggestion lines
        linesDiv.innerHTML = cbResult.dataset.suggLines || '';
      } else {
        // showing unprofitable — restore original lines
        linesDiv.innerHTML = cbResult.dataset.unprofLines || '';
      }
    }
  }

  function showError(msg) {
    document.getElementById('results-area').innerHTML =
      `<div class="error-banner">✗ ${msg}</div>`;
  }

  // Persists cost basis and strike data across screen runs
  const costBasisStore = {};
  const strikeDataStore = {};    // sliced top 3 (displayed)
  const fullStrikeStore = {};    // all up to 10 (for suggestions)
  const renderedCardStore = {};  // ticker -> { strike: htmlString } for all CSP cards

  // Event delegation — one listener handles all cost basis inputs
  document.getElementById('results-area').addEventListener('input', function(e) {
    if (!e.target.classList.contains('cost-basis-input')) return;
    const ticker = e.target.dataset.ticker;
    const dte = parseInt(e.target.dataset.dte);
    const val = e.target.value;
    costBasisStore[ticker] = val;
    updateCostBasis(ticker, val, strikeDataStore[ticker] || [], dte);
  });

  function updateCostBasis(ticker, val, strikes, dte) {
    const cb = parseFloat(val);
    const el = document.getElementById('cbr-' + ticker);
    if (!el) return;

    const suggSection = document.getElementById('sugg-' + ticker);
    const block = document.querySelector(`[data-ticker="${ticker}"]`);
    const isCsp = block && block.dataset.strategy === 'csp';

    if (!val || isNaN(cb) || cb <= 0) {
      el.innerHTML = '';
      if (suggSection) suggSection.style.display = 'none';
      if (isCsp && block) {
        const mainGrid = block.querySelector('.strikes-grid');
        if (mainGrid) {
          const allCards = renderedCardStore[ticker] || [];
          mainGrid.innerHTML = allCards.slice(0, 3).map((c, i) => {
            return i === 0
              ? c.html.replace(/class="strike-card "/, 'class="strike-card best"')
              : c.html.replace(/class="strike-card best"/, 'class="strike-card "');
          }).join('');
        }
      }
      return;
    }

    function fmt(n) {
      const abs = Math.abs(n);
      const decimals = abs % 1 === 0 ? 0 : 2;
      return '$' + abs.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    if (isCsp) {
      const allCards = renderedCardStore[ticker] || [];
      const fullStrikes = fullStrikeStore[ticker] || [];

      const qualifying = fullStrikes.filter(s => s.breakeven <= cb).slice(0, 3);

      // Swap the strikes grid using pre-rendered HTML (qualifying only)
      const mainGrid = block ? block.querySelector('.strikes-grid') : null;
      if (mainGrid) {
        if (qualifying.length === 0) {
          mainGrid.innerHTML = '';
        } else {
          mainGrid.innerHTML = qualifying.map((s, i) => {
            const stored = allCards.find(c => c.strike === s.strike);
            return stored ? stored.html
              .replace('class="strike-card best"', `class="strike-card ${i === 0 ? 'best' : ''}"`)
              .replace('class="strike-card "', `class="strike-card ${i === 0 ? 'best' : ''}"`)
              : '';
          }).join('');
        }
      }

      // Build summary lines matching the grid
      if (qualifying.length === 0) {
        el.innerHTML = `<div class="cb-warning">⚠️ No strikes have an effective buy price at or below $${cb.toFixed(2)}</div>`;
      } else {
        const lines = qualifying.map(s => {
          const saving = cb - s.breakeven;
          const color = '#4ade80';
          return `<span class="cb-strike-result">$${s.strike.toFixed(2)}: <span style="color:${color};font-weight:700;">effective buy $${s.breakeven.toFixed(2)}</span><br><span class="cb-actual">($${saving.toFixed(2)}/sh below target &middot; <span style="color:${color};">+${fmt(saving * 100)}/K</span>)</span><br><span class="cb-actual" style="color:var(--dim);">${s.trade_return.toFixed(2)}% trade return &middot; ${s.ann_return.toFixed(1)}% annualized return</span></span>`;
        }).join('<br><br>');
        el.innerHTML = `<div class="cb-results-wrap"><div class="cb-lines">${lines}</div></div>`;
      }
      if (suggSection) suggSection.style.display = 'none';
      return;
    }

    // ── CC mode (unchanged logic) ─────────────────────────────────────────
    function makeLines(strikesArr) {
      return strikesArr.map((s) => {
        const netProceeds = s.strike + s.premium;
        const gainPerShare = netProceeds - cb;
        const returnPct = (gainPerShare / cb) * 100;
        const color = returnPct >= 0 ? '#4ade80' : '#f87171';
        const sign = returnPct >= 0 ? '+' : '-';
        const totalGain = gainPerShare * 100;
        return `<span class="cb-strike-result">$${s.strike.toFixed(2)}: <span style="color:${color};font-weight:700;">${sign}${Math.abs(returnPct).toFixed(2)}% if called away</span><br><span class="cb-actual">(net ${fmt(netProceeds)}/sh &middot; ${sign}${fmt(gainPerShare)}/sh &middot; <span style="color:${color};">${sign}${fmt(totalGain)}/K</span>)</span></span>`;
      }).join('<br><br>');
    }

    function isProfitable(s) {
      return (s.strike + s.premium - cb) >= 0;
    }

    const lines = makeLines(strikes);
    const allUnprofitable = strikes.length > 0 && strikes.every(s => !isProfitable(s));
    const anyUnprofitable = strikes.length > 0 && strikes.some(s => !isProfitable(s));

    const fullStrikes = fullStrikeStore[ticker] || [];
    const displayedSet = new Set(strikes.map(s => s.strike));
    const suggStrikes = fullStrikes.filter(s => !displayedSet.has(s.strike)).slice(0, 3);
    const hasProfitableSuggestions = suggStrikes.some(s => isProfitable(s));
    const suggLines = suggStrikes.length > 0 ? makeLines(suggStrikes) : '';

    let warning = '';
    if (allUnprofitable) {
      if (hasProfitableSuggestions) {
        warning = `<div class="cb-warning"><span id="warnText-${ticker}">⚠️ No strikes shown are profitable at your cost basis</span><br>
          <span class="cb-profitable-msg" id="profMsg-${ticker}" style="display:none;">💵 <span style="color:#4ade80;">Profitable strikes shown below</span></span>
          <button class="toggle-unprofitable-btn" id="toggleUnprof-${ticker}" onclick="toggleUnprofitable('${ticker}')">Hide unprofitable strikes</button>
        </div>`;
        if (suggSection) suggSection.style.display = 'block';
      } else {
        warning = `<div class="cb-warning">⚠️ No strikes are profitable at your cost basis</div>`;
        if (suggSection) suggSection.style.display = 'none';
      }
    } else if (anyUnprofitable && hasProfitableSuggestions) {
      warning = `<div class="cb-warning"><span id="warnText-${ticker}">⚠️ Some strikes are unprofitable at your cost basis</span><br>
        <span class="cb-profitable-msg" id="profMsg-${ticker}" style="display:none;">💵 <span style="color:#4ade80;">Profitable strikes shown below</span></span>
        <button class="toggle-unprofitable-btn" id="toggleUnprof-${ticker}" onclick="toggleUnprofitable('${ticker}')">Hide unprofitable strikes</button>
      </div>`;
      if (suggSection) suggSection.style.display = 'block';
    } else {
      if (suggSection) suggSection.style.display = 'none';
    }

    const linesDiv = `<div class="cb-lines" id="cblines-${ticker}">${lines}</div>`;
    el.innerHTML = `<div class="cb-results-wrap">${warning}${linesDiv}</div>`;
    el.dataset.unprofLines = lines;
    el.dataset.suggLines = suggLines;
  }

  setDefaultDate();
  initServer();
</script>
</body>
</html>
